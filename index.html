<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div>
                <img src="./img/logo-eecu-white 1.svg" alt="Logo">
            </div>
                <a href="#"> Savings & Checkings </a> 
                <a href="#"> Loads & Credit Cards </a> 
                <a href="#"> Online & Mobile </a> 
                <a href="#"> Insure & Invest </a> 
                <a href="#"> News & Resources </a> 
                <a href="#"> Money 101 </a> 
        </nav>
    </header>
    <section id="progress-bar">
            <div class="progress-bar" id="progress-bar"></div>
    </section>
    <main> 
        <div class="tax-bud" >
            <h2 class="Label" for="tax">Your Career & Tax Deductions:</h2>
            <label for="user">Select your career</label>
            <select name="tax" id="career-dropdown">
                <option value="">--Please choose a career--</option>
            </select>
            <table class="tax">
                <tr>
                    <th>Tax Type</th>
                    <th>Amount</th>
                </tr>
                <tr>
                    <td>Medicare (1.45%)</td>
                    <td id="medicare-val">$0.00</td>
                </tr>
                <tr>
                    <td>Social Security (6.2%)</td>
                    <td id="ss-val">$0.00</td>
                </tr>
                <tr>
                    <td>Federal Income Tax (reliant)</td>
                    <td id="fed-val">$0.00</td>
                </tr>
                <tr>
                    <td>State Tax (4%)</td>
                    <td id="state-val">$0.00</td>
                </tr>
                <tr style="font-weight: bold; background-color: #f0f0f0;">
                    <td>NET TAKE-HOME PAY</td>
                    <td id="net-pay-val">$0.00</td>
                </tr>
            </table>
            </select>
        </div> 
    <section id="Pie Chart">
        <h1>pie</h1>
        <button id="pie-btn">Print</button>
        <button id="pie-btn">Download</button>
        <button id="pie-btn">Custom Expense</button>
        <button id="pie-btn">Create Another</button>
    </section>
    </main>
    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>
