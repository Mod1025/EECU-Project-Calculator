<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>EECU App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
    <header>
        <nav>
            <div>
                <img src="./img/logo-eecu-white 1.svg" alt="Logo">
            </div>
                <a href="#"> Savings & Checkings </a> 
                <a href="#"> Loads & Credit Cards </a> 
                <a href="#"> Online & Mobile </a> 
                <a href="#"> Insure & Invest </a> 
                <a href="#"> News & Resources </a> 
                <a href="#"> Money 101 </a> 
        </nav>
    </header>
    <section id="progress-bar">
            <div class="progress-bar" id="progress-bar"></div>
    </section>
    <main> 
        <div class="tax-bud" >
            <h2 class="Label" for="tax">Your Career & Tax Deductions:</h2>
            <label for="user">Select your career</label>
            <select name="tax" id="tax">
                <option value="">--Please choose a career--</option>
            </select>
                <table class="tax">
                    <tr>
                        <th>Career</th>
                        <th>Tax Deductions</th>
                    </tr>
                    <tr>
                        <td>Medicare</td>
                        <td>1.45%</td>
                    </tr>
                    <tr>
                        <td>Social Security</td>
                        <td>6.2%</td>
                    </tr>
                    <tr>
                        <td>Federal Income Tax</td>
                        <td>Variable</td>
                    </tr>
                    <tr>
                        <td>State Tax</td>
                        <td>4%</td>
                    </tr>
                </table>
            
            <label for="budg">Your Monthly Budget:</label>
            <select name="budg" id="budg">
            </select>
        </div> 
    <section id="Pie Chart">
        <h1>pie</h1>
        <button id="pie-btn">Print</button>
        <button id="pie-btn">Download</button>
        <button id="pie-btn">Custom Expense</button>
        <button id="pie-btn">Create Another</button>
    </section>
    </main>

    </footer>
